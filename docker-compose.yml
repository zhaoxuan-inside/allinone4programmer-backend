version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: allinone-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: iPasswd1234  # 生产环境请使用强密码
      POSTGRES_DB: allinone            # 应用主数据库
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d   # 挂载初始化脚本目录
      - ./custom-pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - backend

  redis:
    image: redis:8.0-alpine
    container_name: allinone-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data: